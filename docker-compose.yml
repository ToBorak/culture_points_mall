services:
  mysql:
    image: mysql:8.4.4
    container_name: cpm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cpm
    ports: ["3306:3306"]
    volumes:
      - cpm-mysql:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: cpm-redis
    restart: unless-stopped
    ports: ["6379:6379"]

volumes:
  cpm-mysql: {}
