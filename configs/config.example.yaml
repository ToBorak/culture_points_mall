server:
  port: 18080
mcp:
  port: 8090
mysql:
  dsn: "root:root@tcp(localhost:3306)/cpm?charset=utf8mb4&parseTime=true&loc=Local"
redis:
  addr: "localhost:6379"
  db: 0
jwt:
  secret: "dev-secret-change-me"
  ttl_hours: 168
dingtalk:
  mode: "mock"
  app_key: ""
  app_secret: ""
  corp_id: ""
  agent_id: 0
  admin_user_ids: []
  calendar_organizer_unionid: ""
  robots: []
llm:
  provider: "claude"
  claude:
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "https://api.anthropic.com"
    model: "claude-sonnet-4-7"
  openai:
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://api.openai.com/v1"
    model: "gpt-5"
  deepseek:
    api_key: "${DEEPSEEK_API_KEY}"
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"
signin:
  secret: "dev-signin-secret"
  window_seconds: 60
seed:
  default_tenant_id: 1
  welcome_bonus: 100000     # 新用户首次登录或老用户总分=0 时自动发放（产品策略，可调小）
  demo_data: false          # true 仅用于演示：生成 50 个假用户(员工01-50)+演示积分；生产保持 false
storage:
  upload_dir: "./uploads"   # 商品/奖品图片本地存储目录；通过 /api/uploads/<file> 访问
stars:
  nominate_points: 2
  nominated_points: 4
  winner_points: 8
  nominate_monthly_cap: 6
  nominated_monthly_cap: 16
